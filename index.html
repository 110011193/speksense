<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Sign in to SpekSense — HR insights and team management." />
    <title>SpekSense — Sign in</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="page">
      <article class="auth-card" id="auth-card-container">
        <section class="auth-form-panel">
          <header class="brand">
            <img class="brand-logo" src="/images/logo.png" alt="SpekSense" />
          </header>

          <div class="auth-form-stack">
            <div class="form-intro">
              <h1 class="form-title">Sign in</h1>
              <p class="form-subtitle">Welcome back! Please enter your details.</p>
            </div>

            <form id="login-form" class="login-form auth-form" autocomplete="on" novalidate>
              <div class="field">
                <label for="email">Email</label>
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder="you@company.com"
                  required
                  autocomplete="email"
                />
              </div>

              <div class="field">
                <label for="password">Password</label>
                <div class="password-wrap">
                  <input
                    type="password"
                    id="password"
                    name="password"
                    placeholder="Your password"
                    required
                    autocomplete="current-password"
                  />
                  <button type="button" id="toggle-password" class="toggle-password" aria-label="Show password">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      width="18"
                      height="18"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="1.75"
                      stroke-linecap="round"
                      stroke-linejoin="round"
                    >
                      <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
              </div>

              <button type="submit" id="submit-btn" class="submit-btn">Submit</button>

              <div class="social-row">
                <button type="button" class="social-btn" id="apple-login-btn">
                  <svg width="16" height="16" viewBox="0 0 170 170" fill="currentColor" aria-hidden="true">
                    <path
                      d="M150.37 130.25c-2.45 5.66-5.35 10.87-8.71 15.66-4.58 6.53-8.33 11.05-11.22 13.56-4.48 4.12-9.28 6.23-14.42 6.35-3.69 0-8.14-1.05-13.32-3.18-5.19-2.12-9.97-3.17-14.34-3.17-4.58 0-9.49 1.05-14.75 3.17-5.26 2.13-9.5 3.24-12.74 3.35-4.39.13-9.13-1.92-14.22-6.14-3.44-2.83-7.29-7.53-11.55-14.1-8.39-12.87-14.48-26.69-18.25-41.44-3.76-14.75-5.65-28.79-5.65-42.1 0-15.15 3.84-27.91 11.53-38.3 7.69-10.37 17.51-15.65 29.47-15.86 5.66 0 11.66 1.63 17.98 4.9 6.33 3.25 10.5 4.9 12.53 4.9 1.77 0 5.63-1.5 11.58-4.5 5.95-3 11.43-4.58 16.45-4.73 11.83-.2 21.84 3.73 30.04 11.81-12.06 7.29-18.01 17.06-17.85 29.3.15 9.77 3.77 17.96 10.86 24.58 7.09 6.61 15.42 10.15 24.97 10.63-2.12 6.53-5.22 13.43-9.31 20.73M119.22 16.15c0 7.42-2.68 14.19-8.06 20.31-5.38 6.13-11.83 9.73-19.37 10.8-1.08-11.37 3.26-21.72 11.02-29.23 7.77-7.51 16.92-11.23 27.46-11.88 1.13 11.95-3.05 21.78-11.05 29.08"
                    />
                  </svg>
                  <span>Apple</span>
                </button>
                <button type="button" class="social-btn" id="google-login-btn">
                  <svg width="16" height="16" viewBox="0 0 24 24" aria-hidden="true">
                    <path
                      fill="#4285F4"
                      d="M23.745 12.27c0-.7-.06-1.4-.19-2.07H12v3.92h6.69c-.29 1.5-.1.84-2.46 2.77v2.3h3.8c2.22-2.05 3.72-5.07 3.72-8.92Z"
                    />
                    <path
                      fill="#34A853"
                      d="M12 24c3.24 0 5.97-1.08 7.96-2.91l-3.8-2.3c-1.05.7-2.4.12-4.16.12-3.2 0-5.9-2.16-6.87-5.07H1.14v2.38C3.12 20.29 7.24 24 12 24Z"
                    />
                    <path
                      fill="#FBBC05"
                      d="M5.13 13.84a7.16 7.16 0 0 1 0-4.56V6.9H1.14a11.94 11.94 0 0 0 0 10.2l3.99-3.26Z"
                    />
                    <path
                      fill="#EA4335"
                      d="M12 4.75c1.77 0 3.35.61 4.6 1.8l3.44-3.44C17.96 1.19 15.24 0 12 0 7.24 0 3.12 3.71 1.14 7.82l3.99 3.26c.97-2.91 3.67-5.07 6.87-5.07Z"
                    />
                  </svg>
                  <span>Google</span>
                </button>
              </div>
            </form>
          </div>

          <footer class="form-footer">
            <p class="signin-text">
              Don&rsquo;t have any account? <a href="/signup" class="link-underline">Sing up</a>
            </p>
            <a href="#" class="link-underline">Terms &amp; Conditions</a>
          </footer>
        </section>

      </article>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
