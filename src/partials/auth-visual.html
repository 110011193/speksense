        <section class="auth-visual-panel" aria-label="Product preview">
          <div class="visual-frame">
            <img
              class="hero-photo"
              src="/images/auth-hero.jpg"
              alt="Team collaborating in a modern office"
              width="1200"
              height="800"
            />

            <div class="widget widget-task" aria-hidden="true">
              <div class="task-card task-card--back">
                <span class="task-dot task-dot--yellow"></span>
              </div>
              <div class="task-card task-card--front">
                <span class="task-dot task-dot--dark"></span>
                <p class="task-title">Task Review With Team</p>
                <p class="task-time">09:30am-10:00am</p>
              </div>
            </div>

            <div class="widget widget-calendar" aria-hidden="true">

                <div class="cal-day cal-day--active">
                  <span class="cal-dow">Wed</span>
                  <span class="cal-num">25</span>

                </div>
                <div class="cal-day"><span class="cal-dow">Thu</span><span class="cal-num">26</span></div>
                <div class="cal-day"><span class="cal-dow">Fri</span><span class="cal-num">27</span></div>
                <div class="cal-day"><span class="cal-dow">Sat</span><span class="cal-num">28</span></div>
              </div>
            </div>

            <div class="widget widget-meeting" aria-hidden="true">
              <span class="meeting-dot"></span>
              <p class="meeting-title">Daily Meeting</p>
              <p class="meeting-time">12:00pm-01:00pm</p>

                <img src="/images/avatar2.png" alt="" width="28" height="28" />
                <img src="/images/avatar3.png" alt="" width="28" height="28" />
                <img src="/images/avatar4.png" alt="" width="28" height="28" />
              </div>
            </div>
          </div>
